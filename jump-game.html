<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>シンプルジャンプゲーム</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f0f0;
            font-family: sans-serif;
        }
        #game-container {
            width: 600px;
            height: 200px;
            border-bottom: 2px solid #333;
            background-color: white;
            position: relative;
            overflow: hidden;
        }
        #player {
            width: 40px;
            height: 40px;
            background-color: #ff4757;
            position: absolute;
            bottom: 0;
            left: 50px;
        }
        .obstacle {
            width: 30px;
            height: 40px;
            background-color: #2f3542;
            position: absolute;
            bottom: 0;
            right: -30px;
        }
        #message {
            margin-top: 20px;
            font-size: 24px;
            font-weight: bold;
        }
        .jump-animation {
            animation: jump 0.5s linear;
        }
        @keyframes jump {
            0% { bottom: 0; }
            30% { bottom: 100px; }
            70% { bottom: 100px; }
            100% { bottom: 0; }
        }
    </style>
</head>
<body onclick="jump()" onkeydown="if(event.code==='Space') jump()">

    <h1>Jump Game</h1>
    <div id="game-container">
        <div id="player"></div>
    </div>
    <div id="message">ゴールまであと: <span id="timer">20</span>秒</div>

    <script>
        const player = document.getElementById("player");
        const container = document.getElementById("game-container");
        const timerDisplay = document.getElementById("timer");
        const message = document.getElementById("message");

        let isJumping = false;
        let isGameOver = false;
        let timeLeft = 20;

        // ジャンプ処理
        function jump() {
            if (isJumping || isGameOver) return;
            isJumping = true;
            player.classList.add("jump-animation");
            setTimeout(() => {
                player.classList.remove("jump-animation");
                isJumping = false;
            }, 500);
        }

        // 障害物の生成
        function createObstacle() {
            if (isGameOver) return;

            const obstacle = document.createElement("div");
            obstacle.classList.add("obstacle");
            container.appendChild(obstacle);

            let obstaclePos = 600;
            
            let moveInterval = setInterval(() => {
                if (isGameOver) {
                    clearInterval(moveInterval);
                    return;
                }

                obstaclePos -= 5;
                obstacle.style.left = obstaclePos + "px";

                // 当たり判定
                let playerBottom = parseInt(window.getComputedStyle(player).getPropertyValue("bottom"));
                
                if (obstaclePos > 50 && obstaclePos < 90 && playerBottom < 40) {
                    gameOver(false);
                }

                if (obstaclePos < -30) {
                    clearInterval(moveInterval);
                    obstacle.remove();
                }
            }, 20);

            // 次の障害物までの時間をランダムに設定
            let nextObstacle = Math.random() * 1000 + 800;
            setTimeout(createObstacle, nextObstacle);
        }

        // タイマー処理
        let countdown = setInterval(() => {
            if (isGameOver) return;
            timeLeft--;
            timerDisplay.innerText = timeLeft;
            
            if (timeLeft <= 0) {
                gameOver(true);
            }
        }, 1000);

        // ゲーム終了処理
        function gameOver(isWin) {
            isGameOver = true;
            clearInterval(countdown);
            if (isWin) {
                message.innerHTML = "🎉 ゴール！おめでとう！";
                message.style.color = "green";
            } else {
                message.innerHTML = "💥 衝突！ゲームオーバー";
                message.style.color = "red";
            }
            const btn = document.createElement("button");
            btn.innerText = "リトライ";
            btn.onclick = () => location.reload();
            document.body.appendChild(btn);
        }

        createObstacle();
    </script>
</body>
</html>
