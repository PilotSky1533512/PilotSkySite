<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>PilotSky 管理者パネル</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="dark-mode"> 
    <header>
        <h1>管理者専用パネル</h1>
        <a href="index.html" style="color: var(--text-color);">サイトへ戻る</a>
    </header>

    <main>
        <section class="admin-box">
            <h2>運営募集履歴</h2>
            <p>募集内容は Formspree の管理画面で安全に保管されています。</p>
            <a href="https://formspree.io/forms" target="_blank">
                <button class="dl-btn">Formspree 受信箱を確認する</button>
            </a>
        </section>

        <section class="admin-box">
            <h2>お知らせ設定</h2>
            <div id="announcement-list"></div>
            
            <hr>
            <h3>新しいお知らせを追加 / 編集</h3>
            <input type="text" id="news-title" placeholder="タイトル">
            <textarea id="news-content" rows="3" placeholder="内容"></textarea>
            <button onclick="addNews()" style="background: var(--accent-color); color:white;">追加 / 更新</button>

            <hr>
            <h3>【重要】サイトへの反映方法</h3>
            <p>編集が終わったら下のコードをコピーして、index.html のお知らせ部分に貼り付けてください。</p>
            <div class="secret-code" id="output-code"></div>
        </section>
    </main>

    <footer>
        <p>©2026 PilotSkyTEAM</p>
    </footer>

    <script>
        let newsData = [
            { title: "サイト公開", content: "PilotSky1533512の公式サイトを公開しました。" }
        ];

        function renderNews() {
            const list = document.getElementById('announcement-list');
            const output = document.getElementById('output-code');
            list.innerHTML = '';
            let htmlCode = "<ul>\n";

            newsData.forEach((item, index) => {
                list.innerHTML += `
                    <div class="announcement-item">
                        <span><strong>${item.title}</strong>: ${item.content}</span>
                        <div>
                            <button onclick="editNews(${index})" style="background:#666; color:white;">編集</button>
                            <button onclick="deleteNews(${index})" style="background:#dc3545; color:white;">削除</button>
                        </div>
                    </div>`;
                
                htmlCode += `  <li><strong>${item.title}</strong> - ${item.content}</li>\n`;
            });

            htmlCode += "</ul>";
            output.innerText = htmlCode;
        }

        function addNews() {
            const title = document.getElementById('news-title').value;
            const content = document.getElementById('news-content').value;
            if(!title || !content) return alert("入力してください");

            newsData.push({ title, content });
            renderNews();
            
            document.getElementById('news-title').value = '';
            document.getElementById('news-content').value = '';
        }

        function deleteNews(index) {
            newsData.splice(index, 1);
            renderNews();
        }

        function editNews(index) {
            document.getElementById('news-title').value = newsData[index].title;
            document.getElementById('news-content').value = newsData[index].content;
            deleteNews(index);
        }

        renderNews();
    </script>
</body>
</html>
