<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PilotSky | 管理者パネル</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .admin-section { margin-bottom: 40px; padding: 20px; border: 1px solid #333; border-radius: 12px; }
        .bbs-manage-item { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 15px; border-bottom: 1px solid #222; 
        }
        .delete-btn { background: #ff4444; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; }
        .delete-btn:hover { background: #cc0000; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Admin Control Panel</h1>

        <div class="admin-section">
            <h2>📢 お知らせ投稿</h2>
            <input type="text" id="news-title" placeholder="タイトル" style="width:100%; margin-bottom:10px; padding:10px; background:#000; color:#fff; border:1px solid #444;">
            <textarea id="news-content" placeholder="内容" style="width:100%; height:100px; padding:10px; background:#000; color:#fff; border:1px solid #444;"></textarea>
            <button onclick="postNews()" class="btn" style="width:100%; margin-top:10px;">お知らせを公開</button>
        </div>

        <div class="admin-section">
            <h2>📋 掲示板管理</h2>
            <p style="font-size: 0.8rem; color: gray; margin-bottom: 15px;">不適切なスレッドを削除できます。</p>
            <div id="admin-bbs-list">
                <p>スレッドを読み込み中...</p>
            </div>
        </div>

        <button onclick="location.href='index.html'" style="background:none; color:gray; border:none; cursor:pointer;">← サイトに戻る</button>
    </div>

    <script src="admin-script.js"></script>
</body>
</html>
