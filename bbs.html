<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>PilotSky | 掲示板</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="main-nav">
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="minecraft.html">Minecraft</a></li>
            <li><a href="media.html">Media</a></li>
            <li><a href="other.html" class="active">Other</a></li>
        </ul>
    </nav>

    <div class="container">
        <div class="content-box">
            <h1>コミュニティ掲示板</h1>
            <p id="bbs-status" style="color: var(--text-muted);">
                ※ 掲示板を利用するには <a href="discord-auth.html" style="color: var(--accent-color);">Discord連携</a> が必要です。
            </p>
        </div>

        <div class="content-box" style="display: flex; gap: 10px; flex-wrap: wrap;">
            <input type="text" id="bbs-search" placeholder="スレッドを検索..." style="flex: 1; padding: 10px; border-radius: 5px; border: 1px solid var(--border-color); background: #000; color: white;">
            <button class="btn" onclick="openCreateModal()" style="background: var(--accent-color);">＋ 掲示板作成</button>
        </div>

        <h2 style="margin-left: 10px;">スレッド一覧</h2>
        <div id="bbs-list" class="grid" style="grid-template-columns: 1fr;">
            <div class="card" style="text-align: left; padding: 20px;">
                <h3>【雑談】みんなで話そう！</h3>
                <p style="font-size: 0.8rem; color: var(--text-muted);">投稿者: PilotBot | 最終更新: 2026/03/17</p>
            </div>
            <div class="card" style="text-align: left; padding: 20px;">
                <h3>【質問】アドオンの入れ方について</h3>
                <p style="font-size: 0.8rem; color: var(--text-muted);">投稿者: Steve | 最終更新: 2026/03/16</p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
