<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PilotSky | Discord詳細</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .discord-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
        }
        .join-section {
            text-align: center;
            width: 100%;
        }
        /* Widgetのレスポンシブ対応 */
        .discord-widget {
            width: 100%;
            max-width: 400px;
            height: 500px;
            border: none;
            border-radius: 15px;
            box-shadow: 0 0 20px var(--accent-glow);
        }
    </style>
</head>
<body>
    <nav class="main-nav">
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="minecraft.html">Minecraft</a></li>
            <li><a href="media.html">Media</a></li>
            <li><a href="other.html">Other</a></li>
        </ul>
    </nav>

    <div class="container">
        <div class="content-box discord-container">
            <div class="join-section">
                <h1>Official Discord Server</h1>
                <p>現在のオンライン状況を確認して、コミュニティに参加しましょう！</p>
                <br>
                <a href="https://discord.com/invite/maeVT24Dym" target="_blank" class="card" style="
                    display:inline-block; 
                    background:#5865F2; 
                    color:white; 
                    padding: 20px 50px; 
                    border-radius: 12px; 
                    text-decoration:none; 
                    font-weight:bold;
                    font-size: 1.2rem;">サーバーに参加する</a>
            </div>

            <iframe class="discord-widget" 
                    src="https://discord.com/widget?id=1373198137811800084&theme=dark" 
                    allowtransparency="true" 
                    frameborder="0" 
                    sandbox="allow-popups allow-popups-to-escape-sandbox allow-same-origin allow-scripts">
            </iframe>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 PilotSky Team</p>
    </footer>

    <script src="script.js"></script>
