<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Flappy Bird</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #70c5ce; /* 空の色 */
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }
        canvas {
            border: 4px solid #fff;
            background-color: #70c5ce;
            box-shadow: 0 0 20px rgba(0,0,0,0.2);
        }
        #ui {
            position: absolute;
            top: 20px;
            text-align: center;
            pointer-events: none;
        }
        h2 { color: white; text-shadow: 2px 2px 4px #333; margin: 0; }
    </style>
</head>
<body>

    <div id="ui">
        <h2 id="scoreBoard">Score: 0</h2>
    </div>
    <canvas id="gameCanvas" width="400" height="500"></canvas>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreBoard = document.getElementById("scoreBoard");

        // ゲーム設定
        let bird = { x: 50, y: 150, width: 34, height: 24, gravity: 0.6, lift: -10, velocity: 0 };
        let pipes = [];
        let frame = 0;
        let score = 0;
        let isGameOver = false;

        // パイプの設定
        const pipeWidth = 50;
        const pipeGap = 150; // 上下の隙間

        // 入力検知
        function moveUp() {
            if (isGameOver) {
                resetGame();
            } else {
                bird.velocity = bird.lift;
            }
        }

        window.addEventListener("mousedown", moveUp);
        window.addEventListener("keydown", (e) => { if(e.code === "Space") moveUp(); });

        function resetGame() {
            bird.y = 150;
            bird.velocity = 0;
            pipes = [];
            score = 0;
            frame = 0;
            isGameOver = false;
            scoreBoard.innerText = "Score: 0";
            loop();
        }

        function drawBird() {
            ctx.fillStyle = "#f1c40f"; // 黄色の鳥
            ctx.fillRect(bird.x, bird.y, bird.width, bird.height);
            // 目を描く
            ctx.fillStyle = "black";
            ctx.fillRect(bird.x + 20, bird.y + 5, 5, 5);
        }

        function drawPipes() {
            ctx.fillStyle = "#2ecc71"; // 緑の土管
            pipes.forEach(pipe => {
                ctx.fillRect(pipe.x, 0, pipeWidth, pipe.top); // 上の土管
                ctx.fillRect(pipe.x, canvas.height - pipe.bottom, pipeWidth, pipe.bottom); // 下の土管
            });
        }

function update() {
            if (isGameOver) return;

            // 鳥の物理演算
            bird.velocity += bird.gravity;
            bird.y += bird.velocity;

            // 地面や天井にぶつかったら終了
            if (bird.y + bird.height > canvas.height || bird.y < 0) {
                gameOver();
            }

            // パイプの生成（100フレームごと）
            if (frame % 100 === 0) {
                let topHeight = Math.random() * (canvas.height / 2);
                if (topHeight < 50) topHeight = 50;
                pipes.push({
                    x: canvas.width,
                    top: topHeight,
                    bottom: canvas.height - topHeight - pipeGap,
                    passed: false // スコア加算済みかどうかのフラグ
                });
            }

            // パイプの移動と判定
            for (let i = pipes.length - 1; i >= 0; i--) {
                let pipe = pipes[i];
                pipe.x -= 3;

                // 当たり判定
                if (
                    bird.x < pipe.x + pipeWidth &&
                    bird.x + bird.width > pipe.x &&
                    (bird.y < pipe.top || bird.y + bird.height > canvas.height - pipe.bottom)
                ) {
                    gameOver();
                }

                // 【修正ポイント】スコア加算：鳥の左端が土管の右端を越えたら
                if (!pipe.passed && bird.x > pipe.x + pipeWidth) {
                    score++;
                    pipe.passed = true;
                    scoreBoard.innerText = "Score: " + score;
                }

                // 画面外に出たパイプを削除
                if (pipe.x + pipeWidth < 0) {
                    pipes.splice(i, 1);
                }
            }

            frame++;
        }

        function gameOver() {
            isGameOver = true;
            ctx.fillStyle = "rgba(0,0,0,0.5)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "white";
            ctx.font = "30px Arial";
            ctx.fillText("GAME OVER", canvas.width / 2 - 80, canvas.height / 2);
            ctx.font = "20px Arial";
            ctx.fillText("Click to Restart", canvas.width / 2 - 70, canvas.height / 2 + 40);
        }

        function loop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            update();
            drawPipes();
            drawBird();
            if (!isGameOver) requestAnimationFrame(loop);
        }

        loop();
    </script>
</body>
</html>
