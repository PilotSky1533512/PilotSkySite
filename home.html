<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PilotSky1533512 Official Site</title>
    <link rel="icon" href="piroaddon.png" type="image/png">
    <link rel="stylesheet" href="style.css">
    <script src="https://www.google.com/recaptcha/api.js" async defer></script>
</head>
<body class="dark-mode">

    <header>
        <h1>PilotSky1533512</h1>
        <button id="mode-toggle">明 / 暗 切り替え</button>
    </header>

    <main>
        <section id="announcement">
            <h2>お知らせ</h2>
            <div id="news-list">
                <div id="news-list-content">
                    <ul>
                        <li>読み込み中...</li>
                    </ul>
                </div>
            </div>
        </section>

        <section id="download">
            <h2>ダウンロード</h2>
            <p>最新のアドオンはこちらから。</p>
            <a href="app.zip" download="PilotSky_Latest">
                <button class="dl-btn">最新版をダウンロード (.zip)</button>
            </a>
        </section>

        <section id="discord">
            <h2>Discord状況</h2>
            <div style="margin-bottom: 20px;">
                <a href="https://x.gd/pirodiscord" target="_blank" rel="noopener noreferrer">
                    <button style="background-color: #5865F2; width: 100%; color: white;">サーバーに参加する</button>
                </a>
            </div>
            <iframe src="https://discord.com/widget?id=1373198137811800084&theme=dark" width="100%" height="400" allowtransparency="true" frameborder="0" sandbox="allow-popups allow-popups-to-escape-sandbox allow-same-origin allow-scripts"></iframe>
        </section>

        <section id="recruitment">
            <h2>運営募集</h2>
            <form action="https://formspree.io/f/あなたのフォームID" method="POST">
                <div class="form-group">
                    <label>メールアドレス (任意)</label>
                    <input type="email" name="email">
                </div>
                <div class="form-group">
                    <label>Discord名 (必須)</label>
                    <input type="text" name="discord_name" required>
                </div>
                <div class="form-group">
                    <label>希望役職</label>
                    <div class="checkbox-group">
                        <label class="checkbox-item"><input type="checkbox" name="role" value="Minecraft"> Minecraft</label>
                        <label class="checkbox-item"><input type="checkbox" name="role" value="Discord"> Discord</label>
                    </div>
                </div>
                <div class="form-group">
                    <label>運営になりたい理由</label>
                    <textarea name="reason" required rows="5"></textarea>
                </div>
                <div class="g-recaptcha" data-sitekey="6LfrtoksAAAAAKgcW-iJKU7y9EwjmGNMpa1XJEns"></div>
                <button type="submit" class="submit-btn">送信する</button>
            </form>
        </section>
    </main>

    <footer>
        <p>©2026 PilotSkyTEAM</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
